{% load recipes_extras %}
<section class="relative w-full bg-warm-cream dark:bg-dark-bg/50 overflow-hidden">
    <div class="pt-8 pb-4 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <nav class="flex items-center text-sm text-slate-500 gap-2">
            <span class="material-symbols-outlined text-sm">home</span>
            <a class="hover:text-[var(--primary)]" href="#">Inicio</a>
            <span class="material-symbols-outlined text-sm">chevron_right</span>
            <a class="hover:text-[var(--primary)]" href="#">Categorías</a>
            <span class="material-symbols-outlined text-sm">chevron_right</span>
            <span class="font-semibold text-slate-800">Postres</span>
        </nav>
    </div>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 animate-fade-in-up">
        <div class="relative flex flex-col md:flex-row items-center gap-12 pb-16">
            <div class="flex-1 space-y-8">
                <div class="flex items-center gap-4">
                    <h1 class="text-5xl md:text-7xl font-bold text-charcoal dark:text-white mb-6 leading-tight tracking-tight">
                        {{category.name}}</h1>
                </div>
                <p class="text-xl md:text-xl text-text-sub dark:text-gray-400 max-w-2xl mx-auto mb-10 font-display font-light">
                    {{category.description}}
                </p>
                <div class="flex gap-6">
                    <div class="bg-white p-5 rounded-2xl shadow-sm min-w-[140px] text-center">
                        <div class="text-4xl font-bold text-black">{{recipes_list|length}}</div>
                        <div class="text-xs uppercase tracking-widest font-semibold text-slate-400 mt-1">Recetas</div>
                    </div>
                    <div class="bg-white p-5 rounded-2xl shadow-sm min-w-[140px] text-center">
                        <div class="text-4xl font-bold text-black">{{recipes_fav_total|format_k}}</div>
                        <div class="text-xs uppercase tracking-widest font-semibold text-slate-400 mt-1">Me gusta</div>
                    </div>
                </div>
            </div>
            <div class="flex-1 w-full max-w-lg">
                <div class="relative group">
                    <div class="absolute -top-12 -left-12 w-48 h-48 bg-orange-400/10 rounded-full blur-3xl"></div>
                    <img alt="Postre variado"
                        class="rounded-[2.5rem] shadow-2xl transform group-hover:scale-[1.01] transition-standard relative z-10 w-full aspect-square object-cover ring-12 ring-white/30"
                        src="{{category.image.url}}" />
                    <div class="absolute -bottom-12 -right-12 w-64 h-64 bg-orange-500/10 rounded-full blur-3xl"></div>
                </div>
            </div>
        </div>
    </div>
</section>
