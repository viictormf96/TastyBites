<section class=" max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 scroll-reveal reveal-active" style="animation-delay: 0.4s">
    <div class="bg-indigo-900 dark:bg-indigo-950 rounded-3xl p-8 md:p-12 overflow-hidden relative group ">
        <div class="absolute top-0 right-0 w-1/3 h-full bg-indigo-800 opacity-20 transform skew-x-12 translate-x-20">
        </div>
        <div class="relative z-10 flex flex-col md:flex-row items-center gap-12">
            <div class="flex-1 space-y-6">
                <div
                    class="inline-block px-4 py-1.5 bg-indigo-500/20 text-indigo-300 rounded-full text-xs font-bold tracking-wider uppercase">
                    Receta Destacada del Mes
                </div>
                <h2 class="text-4xl md:text-5xl font-display font-bold text-white">
                    {{featured_recipe.name}}
                </h2>
                <p class="text-indigo-100 text-lg opacity-90 max-w-lg leading-relaxed">
                    {{featured_recipe.description}}
                </p>
                <div class="flex items-center gap-6 text-indigo-200">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-orange-400">schedule</span>
                        {{featured_recipe.cooking_time}}
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-orange-400">local_fire_department</span>
                        {{featured_recipe.calories}}
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-orange-400">star</span>
                        {{featured_recipe.total_favorites}}
                    </div>
                </div>
                <button
                    class="bg-white text-indigo-900 px-8 py-4 rounded-xl font-bold hover:bg-indigo-50 transition-standard flex items-center gap-2 group-hover:shadow-xl">
                    Ver Receta Completa
                    <span class="material-symbols-outlined">arrow_forward</span>
                </button>
            </div>
           <div class="flex-1 w-full relative">
                <div class="relative rounded-2xl overflow-hidden shadow-2xl h-[350px] md:h-full min-h-[420px] ring-8 ring-white/10 group/img">
        
                    <div class="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-110"
                        style="background-image: url('{{featured_recipe.image.url}}');">
                    </div>

                    <div class="absolute top-4 left-4 z-20 bg-primary/90 backdrop-blur-sm text-white px-2 py-1 rounded text-xs font-bold uppercase tracking-wide">
                        {{featured_recipe.difficulty.name}}
                    </div>

                    <button class="absolute top-4 right-4 z-20 bg-white/90 dark:bg-slate-900/80 backdrop-blur-md p-2.5 rounded-full text-gray-400 hover:text-red-500 transition-all hover:scale-110 shadow-xl active:scale-95 border border-white/20">
                        <span class="material-symbols-outlined block text-[22px]">favorite</span>
                    </button>
        
                <div class="absolute inset-x-0 bottom-0 h-1/4 bg-gradient-to-t from-black/50 to-transparent"></div>
                </div>
            </div>
        </div>
    </div>
</section>
