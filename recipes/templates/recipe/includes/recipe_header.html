{% load recipes_extras %}
<section class="relative w-full bg-warm-cream dark:bg-dark-bg/50 py-16 md:py-24 overflow-hidden">
    <div class="absolute top-0 right-0 -mr-20 -mt-20 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
    <div
        class="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 bg-orange-200/20 dark:bg-orange-900/10 rounded-full blur-3xl">
    </div>
    <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-12 items-center">
        <div class="space-y-6">
            <!-- Breadcrumbs -->
            <nav class="flex items-center gap-2 text-sm font-medium text-slate-500 dark:text-slate-400">
                <a class="hover:text-primary" href="{% url "core:index" %}">Home</a>
                <span class="material-symbols-outlined text-xs">chevron_right</span>
                <a class="hover:text-primary" href="{% url "recipes:recipes" %}">Recipes</a>
                <span class="material-symbols-outlined text-xs">chevron_right</span>
                <span class="text-slate-900 dark:text-slate-200">Main Course</span>
            </nav>
            <h2 class="font-serif text-5xl md:text-6xl text-slate-900 dark:text-white leading-tight">
                {{ recipe.name|highlight_last_word }}
            </h2>
            <p class="text-lg md:text-xl text-text-sub dark:text-gray-400 max-w-2xl mx-auto mb-10 font-display font-light">
                {{recipe.description}}
            </p>
            <!-- Author Info -->
            <div class="flex items-center gap-4 py-4">
                <a href="" class="flex items-center gap-3 group transition-all">
                    <div class="size-12 rounded-full overflow-hidden border-2 border-primary transition-transform group-hover:scale-105 group-hover:shadow-md">
                        <img class="w-full h-full object-cover"
                            src="{{recipe.user.profile_picture.url}}" />
                    </div>
                    <div>
                        <p class="text-slate-900 dark:text-white font-bold transition-colors group-hover:text-primary">
                            Chef Sofia Rossi
                        </p>
                    </div>
                </a>
                <button class="btn-action ml-4 px-6 py-2 rounded-full text-sm font-bold shadow-md">
                    Follow
                </button>
            </div>
        </div>
        <!-- Hero Image -->
        <div class="relative group">
            <div
                class="absolute -inset-4 bg-primary/10 rounded-[2rem] blur-2xl group-hover:bg-primary/20 transition-all">
            </div>
            <div class="relative rounded-3xl overflow-hidden shadow-2xl aspect-[4/3]">
                <img class="w-full h-full object-cover transform transition-transform duration-700 group-hover:scale-105"
                    src="{{recipe.image.url}}" />
            </div>
        </div>
    </div>
</section>
