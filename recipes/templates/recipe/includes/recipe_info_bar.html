<section class="bg-background-light bg-soft-gray/30 ">
    <div class="max-w-5xl mx-auto -mt-12 px-6 relative animate-fade-in-up">
        <div class="glass rounded-2xl grid grid-cols-2 md:grid-cols-4 gap-4 p-8 shadow-xl">
            <div
                class="flex flex-col items-center text-center gap-2 border-r border-slate-200 dark:border-slate-700 last:border-0">
                <span class="material-symbols-outlined text-primary text-3xl">schedule</span>
                <div>
                    <p class="text-xs font-bold uppercase tracking-wider text-slate-400">Tiempo</p>
                    <p class="font-bold text-lg dark:text-white">{{recipe.cooking_time}} min</p>
                </div>
            </div>
            <div
                class="flex flex-col items-center text-center gap-2 border-r border-slate-200 dark:border-slate-700 last:border-0">
                <span class="material-symbols-outlined text-primary text-3xl">bar_chart</span>
                <div>
                    <p class="text-xs font-bold uppercase tracking-wider text-slate-400">Dificultad</p>
                    <p class="font-bold text-lg dark:text-white">{{recipe.difficulty}}</p>
                </div>
            </div>
            <div
                class="flex flex-col items-center text-center gap-2 border-r border-slate-200 dark:border-slate-700 last:border-0">
                <span class="material-symbols-outlined text-primary text-3xl">local_fire_department</span>
                <div>
                    <p class="text-xs font-bold uppercase tracking-wider text-slate-400">calorias</p>
                    <p class="font-bold text-lg dark:text-white">{{recipe.calories}} kcal</p>
                </div>
            </div>
            <div class="flex flex-col items-center text-center gap-2">
                <span class="material-symbols-outlined text-primary text-3xl">restaurant</span>
                <div>
                    <p class="text-xs font-bold uppercase tracking-wider text-slate-400">Porciones</p>
                    <p class="font-bold text-lg dark:text-white">{{recipe.servings}} Servings</p>
                </div>
            </div>
        </div>
    </div>
</section>
